name: "CLA Assistant"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLAAssistant:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant"
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/v1/cla.json'
          path-to-document: 'https://github.com/Yuxin-Ren-SZ/FreezerManager/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: Yuxin-Ren-SZ,dependabot[bot]
          remote-organization-name: Yuxin-Ren-SZ
          remote-repository-name: FreezerManager
          custom-notsigned-prcomment: |
            Thanks for the contribution! Before we can merge, we need you to sign the FreezerManager Contributor License Agreement (see [CLA.md](https://github.com/Yuxin-Ren-SZ/FreezerManager/blob/main/CLA.md)).

            **You can sign the CLA by posting the following as a comment on this PR:**

            > I have read the CLA Document and I hereby sign the CLA

            You only need to do this once. Future PRs will be checked against your signed status automatically.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✅'
