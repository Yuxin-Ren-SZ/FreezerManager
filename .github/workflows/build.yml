name: Build

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.compiler }} ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            preset: dev
            build_type: Debug
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            preset: release
            build_type: Release
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: dev
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: release
            build_type: Release
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: asan
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: ubsan
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: tsan
            build_type: Debug

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fmgr_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      # The Conan build of gRPC/abseil/protobuf plus a full (Debug) build tree
      # can exceed the ~14 GB free on a hosted runner, crashing the runner with
      # "No space left on device". Reclaim ~20+ GB of preinstalled toolchains we
      # never use before building. Best-effort: never fail the job on cleanup.
      - name: Free up disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-17 \
            clang-format-17 \
            clang-tidy-17 \
            cmake \
            g++-13 \
            gcc-13 \
            gcovr \
            ninja-build \
            pipx
          pipx install conan
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.py', 'conan.lock') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Configure Conan
        run: conan profile detect --force

      - name: Install dependencies
        run: >
          conan install .
          --lockfile=conan.lock
          --output-folder=out/conan/${{ matrix.preset }}
          --build=missing
          -s build_type=${{ matrix.build_type }}
          -s compiler.cppstd=gnu20

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        # Cap parallelism to 2. The Debug presets statically link several
        # gRPC-heavy integration-test executables; linking them all at the
        # default width (~cores+2) peaks past the runner's 16 GB RAM and the
        # OOM killer takes down the job (ninja "interrupted by user", exit 143).
        # Conan deps are prebuilt/cached, so this only paces our own tree.
        run: cmake --build --preset ${{ matrix.preset }} -j 2

      - name: Test
        if: ${{ matrix.preset == 'dev' || matrix.preset == 'asan' || matrix.preset == 'ubsan' || matrix.preset == 'tsan' }}
        env:
          FMGR_TEST_POSTGRES_URL: postgresql://postgres:test@localhost/fmgr_test
        # The gRPC server integration tests are excluded under asan/tsan: Conan's
        # gRPC/absl are built without sanitizers, so they emit library-internal
        # false positives across the instrumentation boundary. Our own code stays
        # covered under sanitizers by the unit tests.
        run: >
          ctest --preset ${{ matrix.preset }} --output-on-failure
          ${{ (matrix.preset == 'asan' || matrix.preset == 'tsan') && '--label-exclude grpc_integration' || '' }}

      - name: Check SPDX headers
        run: tools/check-spdx-headers.sh

      - name: Check formatting
        run: |
          files="$(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' '*.ipp' '*.proto')"
          if [ -n "$files" ]; then
            clang-format-17 --dry-run --Werror $files
          fi

      - name: Run clang-tidy
        if: ${{ matrix.preset == 'dev' }}
        run: |
          # run-clang-tidy (ships with LLVM) lints every TU in compile_commands.json
          # in parallel; only our sources are in the compile DB (Conan deps are
          # prebuilt). The trailing regex (Python re.search, negative lookahead)
          # excludes the protoc/grpc-generated .pb.cc / .grpc.pb.cc translation
          # units, which are not ours to lint.
          run-clang-tidy-17 -p out/build/dev -j "$(nproc)" -quiet '^(?!.*proto_generated).*$'

      - name: Coverage tooling
        if: ${{ matrix.preset == 'dev' }}
        continue-on-error: true
        run: gcovr --version
