name: Build

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.compiler }} ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            preset: dev
            build_type: Debug
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            preset: release
            build_type: Release
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: dev
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: release
            build_type: Release
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: asan
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: ubsan
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: tsan
            build_type: Debug

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: fmgr_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-17 \
            clang-format-17 \
            clang-tidy-17 \
            cmake \
            g++-13 \
            gcc-13 \
            gcovr \
            ninja-build \
            pipx
          pipx install conan
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.txt', 'conan.lock') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Configure Conan
        run: conan profile detect --force

      - name: Install dependencies
        run: >
          conan install .
          --lockfile=conan.lock
          --output-folder=out/conan/${{ matrix.preset }}
          --build=missing
          -s build_type=${{ matrix.build_type }}
          -s compiler.cppstd=gnu20

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: ${{ matrix.preset == 'dev' || matrix.preset == 'asan' || matrix.preset == 'ubsan' || matrix.preset == 'tsan' }}
        env:
          FMGR_TEST_POSTGRES_URL: postgresql://postgres:test@localhost/fmgr_test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Check SPDX headers
        run: tools/check-spdx-headers.sh

      - name: Check formatting
        run: |
          files="$(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' '*.ipp' '*.proto')"
          if [ -n "$files" ]; then
            clang-format-17 --dry-run --Werror $files
          fi

      - name: Run clang-tidy
        if: ${{ matrix.preset == 'dev' }}
        run: |
          # run-clang-tidy (ships with LLVM) lints every TU in compile_commands.json
          # in parallel; only our sources are in the compile DB (Conan deps are
          # prebuilt), so no extra file filter is needed.
          run-clang-tidy-17 -p out/build/dev -j "$(nproc)" -quiet

      - name: Coverage tooling
        if: ${{ matrix.preset == 'dev' }}
        continue-on-error: true
        run: gcovr --version
