name: Build

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.compiler }} ${{ matrix.preset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            preset: dev
            build_type: Debug
          - compiler: gcc-13
            cc: gcc-13
            cxx: g++-13
            preset: release
            build_type: Release
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: dev
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: release
            build_type: Release
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: asan
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: ubsan
            build_type: Debug
          - compiler: clang-17
            cc: clang-17
            cxx: clang++-17
            preset: tsan
            build_type: Debug

    steps:
      - uses: actions/checkout@v4

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang-17 \
            clang-format-17 \
            clang-tidy-17 \
            cmake \
            g++-13 \
            gcc-13 \
            gcovr \
            ninja-build \
            pipx
          pipx install conan
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Conan
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-${{ hashFiles('conanfile.txt', 'conan.lock') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.build_type }}-
            conan-${{ runner.os }}-

      - name: Configure Conan
        run: conan profile detect --force

      - name: Install dependencies
        run: >
          conan install .
          --lockfile=conan.lock
          --output-folder=out/conan/${{ matrix.preset }}
          --build=missing
          -s build_type=${{ matrix.build_type }}

      - name: Configure CMake
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: ${{ matrix.preset == 'dev' }}
        run: ctest --preset dev

      - name: Check SPDX headers
        run: tools/check-spdx-headers.sh

      - name: Check formatting
        run: |
          files="$(git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' '*.ipp' '*.proto')"
          if [ -n "$files" ]; then
            clang-format-17 --dry-run --Werror $files
          fi

      - name: Run clang-tidy
        if: ${{ matrix.preset == 'dev' }}
        run: |
          files="$(git ls-files 'src/*.cc' 'src/*.cpp' 'src/**/*.cc' 'src/**/*.cpp' 'tests/*.cc' 'tests/*.cpp' 'tests/**/*.cc' 'tests/**/*.cpp')"
          if [ -n "$files" ]; then
            clang-tidy-17 -p out/build/dev $files
          fi

      - name: Coverage tooling
        if: ${{ matrix.preset == 'dev' }}
        continue-on-error: true
        run: gcovr --version
